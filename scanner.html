<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>סורק ספרים</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      overflow: hidden;
    }

    h2 { font-size: 20px; font-weight: 800; text-align: center; }
    .sub { font-size: 13px; color: rgba(255,255,255,0.55); text-align: center; }

    .video-wrap {
      position: relative;
      width: min(320px, 90vw);
      height: min(320px, 90vw);
      border-radius: 18px;
      overflow: hidden;
      border: 3px solid #3b5bdb;
      box-shadow: 0 0 40px rgba(59,91,219,0.5);
    }
    video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .scan-line {
      position: absolute;
      left: 8%; right: 8%;
      height: 2px;
      background: #3b5bdb;
      box-shadow: 0 0 10px rgba(59,91,219,0.9);
      animation: scanLine 2s ease-in-out infinite;
    }
    @keyframes scanLine { 0%,100%{top:15%} 50%{top:85%} }

    /* פינות */
    .c { position:absolute; width:22px; height:22px; border-color:#fff; border-style:solid; }
    .tl{top:8px;right:8px;border-width:3px 0 0 3px}
    .tr{top:8px;left:8px;border-width:3px 3px 0 0}
    .bl{bottom:8px;right:8px;border-width:0 0 3px 3px}
    .br{bottom:8px;left:8px;border-width:0 3px 3px 0}

    .status {
      font-size: 13px; font-weight: 700;
      background: rgba(59,91,219,0.2);
      border: 1px solid rgba(59,91,219,0.4);
      border-radius: 20px;
      padding: 8px 20px;
      color: #748ffc;
      text-align: center;
    }

    /* מסך הצלחה */
    #success { display:none; flex-direction:column; align-items:center; gap:12px; text-align:center; }
    .big-check { font-size: 64px; }
    .success-title { font-size: 22px; font-weight: 800; color: #0ca678; }
    .book-name { font-size: 17px; font-weight: 700; }
    .closing { font-size: 13px; color: rgba(255,255,255,0.5); }

    /* שגיאה */
    #error { display:none; flex-direction:column; align-items:center; gap:12px; text-align:center; }
    .err-icon { font-size: 52px; }
    .err-title { font-size: 18px; font-weight: 800; color: #e03131; }
    .err-sub { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; max-width: 280px; }
    .btn-retry {
      margin-top: 4px;
      padding: 12px 28px; background: #3b5bdb; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    canvas { display: none; }
  </style>
</head>
<body>

  <!-- מסך סריקה -->
  <div id="scan-screen" style="display:flex;flex-direction:column;align-items:center;gap:20px;width:100%">
    <h2>📷 סריקת ספר</h2>
    <div class="sub">כוון את המצלמה לקוד QR על הספר</div>
    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-line"></div>
      <div class="c tl"></div><div class="c tr"></div>
      <div class="c bl"></div><div class="c br"></div>
    </div>
    <div class="status" id="status">מאתחל מצלמה...</div>
  </div>

  <!-- מסך הצלחה -->
  <div id="success">
    <div class="big-check">✅</div>
    <div class="success-title">זוהה בהצלחה!</div>
    <div class="book-name" id="book-name-display"></div>
    <div class="closing">החלון ייסגר אוטומטית...</div>
  </div>

  <!-- מסך שגיאה -->
  <div id="error">
    <div class="err-icon">📵</div>
    <div class="err-title">לא ניתן לגשת למצלמה</div>
    <div class="err-sub" id="err-msg">ודא שנתת הרשאת מצלמה לדפדפן זה</div>
    <button class="btn-retry" onclick="location.reload()">🔄 נסה שוב</button>
  </div>

  <canvas id="canvas"></canvas>

<script>
  var video   = document.getElementById('video');
  var canvas  = document.getElementById('canvas');
  var ctx     = canvas.getContext('2d');
  var status  = document.getElementById('status');
  var scanned = false;
  var raf     = null;

  // קבל את ה-origin של הספרייה מה-URL
  var params      = new URLSearchParams(window.location.search);
  var libraryOrigin = params.get('origin') || '*';

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
  })
  .then(function(stream) {
    video.srcObject = stream;
    video.play();
    status.textContent = '🔍 מחפש קוד QR...';
    raf = requestAnimationFrame(tick);
  })
  .catch(function(err) {
    document.getElementById('scan-screen').style.display = 'none';
    document.getElementById('err-msg').textContent = err.message || 'שגיאה לא ידועה';
    document.getElementById('error').style.display = 'flex';
  });

  function tick() {
    if (scanned) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      var img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
      if (code && code.data) {
        scanned = true;
        stopCamera();
        onScanned(code.data.trim());
        return;
      }
    }
    raf = requestAnimationFrame(tick);
  }

  function stopCamera() {
    if (video.srcObject) video.srcObject.getTracks().forEach(function(t){ t.stop(); });
  }

  function onScanned(bookName) {
    // הצג מסך הצלחה
    document.getElementById('scan-screen').style.display = 'none';
    document.getElementById('book-name-display').textContent = bookName;
    document.getElementById('success').style.display = 'flex';

    // שלח postMessage לחלון הפותח (Index.html)
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({ type: 'QR_SCANNED', book: bookName }, libraryOrigin);
    }

    // סגור אחרי 1.5 שניות
    setTimeout(function() { window.close(); }, 1500);
  }
</script>
</body>
</html>
