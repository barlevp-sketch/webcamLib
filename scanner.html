<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>סורק ספרייה</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;
      min-height:100dvh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;padding:16px;}
    h2{font-size:18px;font-weight:800;text-align:center;}
    .sub{font-size:13px;color:rgba(255,255,255,0.55);text-align:center;}
    .vwrap{position:relative;width:min(300px,88vw);height:min(300px,88vw);
      border-radius:16px;overflow:hidden;border:3px solid #3b5bdb;
      box-shadow:0 0 30px rgba(59,91,219,0.5);}
    video{width:100%;height:100%;object-fit:cover;display:block;}
    .laser{position:absolute;left:8%;right:8%;height:2px;background:#3b5bdb;
      box-shadow:0 0 8px #3b5bdb;animation:sc 2s ease-in-out infinite;}
    @keyframes sc{0%,100%{top:15%}50%{top:85%}}
    .c{position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid;}
    .tl{top:8px;right:8px;border-width:3px 0 0 3px}
    .tr{top:8px;left:8px;border-width:3px 3px 0 0}
    .bl{bottom:8px;right:8px;border-width:0 0 3px 3px}
    .br{bottom:8px;left:8px;border-width:0 3px 3px 0}
    .status{font-size:13px;font-weight:700;background:rgba(59,91,219,0.2);
      border:1px solid rgba(59,91,219,0.4);border-radius:20px;
      padding:8px 20px;color:#748ffc;text-align:center;}
    #success{display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;}
    .ok{font-size:22px;font-weight:800;color:#0ca678;}
    .bk{font-size:17px;font-weight:700;}
    .cl{font-size:13px;color:rgba(255,255,255,0.5);}
    .btn{padding:12px 28px;background:#64748b;color:#fff;border:none;
      border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
    canvas{display:none;}
  </style>
</head>
<body>

  <div id="scan-screen" style="display:flex;flex-direction:column;align-items:center;gap:16px;width:100%">
    <h2>📷 סריקת ספר</h2>
    <div class="sub">כוון את המצלמה לקוד QR</div>
    <div class="vwrap">
      <video id="video" autoplay muted playsinline></video>
      <div class="laser"></div>
      <div class="c tl"></div><div class="c tr"></div>
      <div class="c bl"></div><div class="c br"></div>
    </div>
    <div class="status" id="status">מאתחל מצלמה...</div>
    <button class="btn" onclick="window.close()">✕ סגור</button>
  </div>

  <div id="success" style="display:none;flex-direction:column;align-items:center;gap:10px;text-align:center;">
    <div style="font-size:60px">✅</div>
    <div class="ok">זוהה בהצלחה!</div>
    <div class="bk" id="book-name"></div>
    <div class="cl">עובר לסריקה הבאה...</div>
    <button class="btn" onclick="window.close()">✕ סגור מצלמה</button>
  </div>

  <canvas id="cv"></canvas>

<script>
  var params  = new URLSearchParams(window.location.search);
  var SESSION = params.get('sid') || '';
  var GAS_URL = '', idToBook = {}, idToStudent = {};

  // קרא נתונים מ-sessionStorage של חלון הפותח
  try {
    var src = (window.opener && !window.opener.closed)
              ? window.opener.sessionStorage : sessionStorage;
    GAS_URL     = src.getItem('lib_gas')      || '';
    idToBook    = JSON.parse(src.getItem('lib_ids')      || '{}');
    idToStudent = JSON.parse(src.getItem('lib_students') || '{}');
    if (!SESSION) SESSION = src.getItem('lib_sid') || '';
  } catch(e) {}

  var video  = document.getElementById('video');
  var cv     = document.getElementById('cv');
  var ctx    = cv.getContext('2d');
  var scanned = false;
  var timer   = null;

  navigator.mediaDevices.getUserMedia({
    video: { facingMode:{ ideal:'environment' }, width:{ ideal:1280 }, height:{ ideal:720 } }
  })
  .then(function(stream) {
    video.srcObject = stream;
    video.play();
    document.getElementById('status').textContent = '🔍 מחפש קוד QR...';
    timer = setInterval(scan, 150);
  })
  .catch(function(err) {
    document.getElementById('status').textContent = '❌ ' + err.message;
  });

  function scan() {
    if (scanned || video.readyState < 2) return;
    cv.width  = video.videoWidth;
    cv.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    var img  = ctx.getImageData(0, 0, cv.width, cv.height);
    var code = jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' })
            || jsQR(img.data, img.width, img.height, { inversionAttempts:'invertFirst' });
    if (code && code.data) {
      scanned = true;
      clearInterval(timer);
      video.srcObject.getTracks().forEach(function(t){ t.stop(); });
      onScanned(code.data.trim());
    }
  }

  function onScanned(code) {
    beep();
    var display = idToBook[code] || idToStudent[code]
                  ? (idToBook[code] || (idToStudent[code].fullName + ' | ' + idToStudent[code].classGroup))
                  : code;

    // שלח לשרת
    if (GAS_URL && SESSION) {
      var url = GAS_URL + '?action=scan&sid=' + encodeURIComponent(SESSION)
              + '&book=' + encodeURIComponent(code);
      fetch(url, { mode:'no-cors' }).catch(function(){});
    }

    // postMessage לחלון הפותח
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type:'QR_SCANNED', book: code }, '*');
      }
    } catch(e) {}

    // הצג הצלחה ועבור לסריקה הבאה אחרי 1.5 שניות
    document.getElementById('scan-screen').style.display = 'none';
    document.getElementById('book-name').textContent = display;
    document.getElementById('success').style.display = 'flex';

    setTimeout(function() {
      scanned = false;
      document.getElementById('success').style.display = 'none';
      document.getElementById('scan-screen').style.display = 'flex';
      navigator.mediaDevices.getUserMedia({
        video: { facingMode:{ ideal:'environment' }, width:{ ideal:1280 }, height:{ ideal:720 } }
      }).then(function(stream) {
        video.srcObject = stream;
        video.play();
        document.getElementById('status').textContent = '🔍 מחפש קוד QR...';
        timer = setInterval(scan, 150);
      });
    }, 1500);
  }

  function beep() {
    try {
      var ac=new(window.AudioContext||window.webkitAudioContext)();
      var o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value=880; o.type='sine';
      g.gain.setValueAtTime(0.3,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);
      o.start(ac.currentTime); o.stop(ac.currentTime+0.2);
    } catch(e){}
  }
</script>
</body>
</html>
