<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>סורק ספרייה מהיר + צילום</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif; background: #0f172a; color: #fff;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; padding: 16px;
    }
    h2 { font-size: 18px; font-weight: 800; text-align: center; }
    .sub { font-size: 13px; color: rgba(255,255,255,0.55); text-align: center; }
    .vwrap {
      position: relative; width: min(290px, 86vw); height: min(290px, 86vw);
      border-radius: 16px; overflow: hidden; border: 3px solid #3b5bdb;
      box-shadow: 0 0 30px rgba(59,91,219,0.5);
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .laser {
      position: absolute; left: 8%; right: 8%; height: 2px; background: #3b5bdb;
      box-shadow: 0 0 8px #3b5bdb; animation: sc 2s ease-in-out infinite;
    }
    @keyframes sc { 0%, 100% { top: 15% } 50% { top: 85% } }
    .c { position: absolute; width: 20px; height: 20px; border-color: #fff; border-style: solid; }
    .tl { top: 8px; right: 8px; border-width: 3px 0 0 3px }
    .tr { top: 8px; left: 8px; border-width: 3px 3px 0 0 }
    .bl { bottom: 8px; right: 8px; border-width: 0 0 3px 3px }
    .br { bottom: 8px; left: 8px; border-width: 0 3px 3px 0 }
    .status {
      font-size: 13px; font-weight: 700; background: rgba(59,91,219,0.2);
      border: 1px solid rgba(59,91,219,0.4); border-radius: 20px;
      padding: 8px 20px; color: #748ffc; text-align: center; max-width: 300px;
    }
    .btn {
      padding: 13px; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 800; cursor: pointer; color: #fff; width: 100%; max-width: 300px;
    }
    .btn-blue { background: #3b5bdb; }
    .btn-gray { background: rgba(255,255,255,0.12); font-size: 13px; font-weight: 600; }
    .screen { display: none; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    .screen.on { display: flex; }
  </style>
</head>
<body>

<div id="s1" class="screen on">
  <h2>📷 סרוק קוד ברקוד / QR</h2>
  <div class="sub">כוון את מצלמת המכשיר ישירות לקוד<br>(תמונה תילקח אוטומטית בעת הזיהוי)</div>
  <div class="vwrap">
    <video id="v1" autoplay muted playsinline></video>
    <div class="laser"></div>
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
  </div>
  <div class="status" id="st1">מפעיל מצלמה...</div>
  <button class="btn btn-gray" onclick="window.close()">✕ ביטול וסגירה</button>
</div>

<div id="serr" class="screen">
  <div style="font-size:48px">📵</div>
  <div style="font-size:17px;font-weight:800;color:#e03131;">לא ניתן לגשת למצלמה</div>
  <div style="font-size:13px;color:rgba(255,255,255,0.5);" id="errmsg"></div>
  <button class="btn btn-blue" onclick="location.reload()">🔄 נסה שוב</button>
</div>

<script>
  var params   = new URLSearchParams(window.location.search);
  var SESSION  = params.get('sid') || '';
  var lastCode = '';
  var activeScanner = null;

  function beep() {
    try {
      var ac = new (window.AudioContext || window.webkitAudioContext)();
      var o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      o.start(ac.currentTime); o.stop(ac.currentTime + 0.2);
    } catch(e){}
  }

  function startCam() {
    document.getElementById('st1').textContent = '🔍 מחפש ברקוד או קוד QR...';

    var scannerId = 'h5qr-v1';
    var scanDiv = document.createElement('div');
    scanDiv.id = scannerId;
    var vWrap = document.getElementById('v1').parentElement;
    vWrap.appendChild(scanDiv);
    
    document.getElementById('v1').style.display = 'none';
    scanDiv.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';

    var scanner = new Html5Qrcode(scannerId);
    activeScanner = scanner;
    
    var config = { fps: 25, qrbox: undefined, aspectRatio: 1.0, disableFlip: false };
    
    var onSuccess = function(code) {
      if (code && code !== lastCode) {
        lastCode = code;
        handleScannedCode(code.trim());
      }
    };

    var showError = function(msg) {
      document.getElementById('v1').style.display = 'block';
      if (scanDiv.parentNode) scanDiv.parentNode.removeChild(scanDiv);
      activeScanner = null;
      document.getElementById('errmsg').innerHTML = msg; 
      document.getElementById('s1').className = 'screen';
      document.getElementById('serr').className = 'screen on';
    };

    // 1. בדיקה קריטית: האם אנחנו רצים בתוך iframe של גוגל שיטס שחוסם את המצלמה?
    var isIframe = false;
    try { isIframe = window.self !== window.top; } catch(e) { isIframe = true; }

    if (isIframe) {
        showError("המצלמה חסומה בגלל הגדרות האבטחה של גוגל!<br><br><b>אסור לפתוח את הסורק בתוך חלונית קופצת בגיליון. יש להקפיד שהקישור נפתח בטאב חדש (חלון עצמאי) בדפדפן.</b>");
        return;
    }

    // 2. חיפוש כל המצלמות במכשיר והפעלה חכמה (למניעת קריסה במחשבים ללא מצלמה אחורית)
    Html5Qrcode.getCameras().then(function(devices) {
      if (devices && devices.length > 0) {
        var cameraId = devices[0].id; // נבחר את המצלמה הראשונה שקיימת כברירת מחדל (למשל מצלמת רשת בנייד)
        
        // ננסה לשדרג למצלמה אחורית אם המכשיר תומך בכך (טלפון/טאבלט)
        for (var i = 0; i < devices.length; i++) {
          if (devices[i].label.toLowerCase().indexOf("back") !== -1 ||
              devices[i].label.toLowerCase().indexOf("environment") !== -1) {
            cameraId = devices[i].id;
            break;
          }
        }

        scanner.start(cameraId, config, onSuccess, function(err) {})
        .catch(function(e) {
           showError("שגיאה בהפעלת המצלמה: " + (e.message || e));
        });
      } else {
         showError("לא נמצאה שום מצלמה מחוברת למכשיר.");
      }
    }).catch(function(err) {
       showError("אין הרשאה למצלמה. אנא ודא שאפשרת גישה למצלמה בדפדפן שלך.<br><small>(" + err + ")</small>");
    });
  }

  function stopScan() {
    if (activeScanner) {
      try { activeScanner.stop().catch(function(){}); } catch(e){}
      activeScanner = null;
    }
    var v = document.getElementById('v1');
    if (v && v.srcObject) {
      v.srcObject.getTracks().forEach(function(t){ t.stop(); });
    }
  }

  // פונקציה חדשה: לוכדת תמונה מתוך המצלמה באותו הרגע
  function takeSnapshot() {
    try {
      var videoElement = document.querySelector('video');
      if (!videoElement || !videoElement.videoWidth) return null;
      
      var canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      
      // החזרת התמונה בפורמט Base64 קל
      return canvas.toDataURL('image/jpeg', 0.8);
    } catch(e) {
      console.error("שגיאה בצילום התמונה:", e);
      return null;
    }
  }

  function handleScannedCode(code) {
    beep();
    
    // מצלם את התמונה שניה לפני שסוגר את המצלמה!
    var capturedImage = takeSnapshot();
    
    stopScan();

    // שליחת התוצאה חזרה לממשק הראשי (כולל התמונה)
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ 
          type: 'QR_SCANNED', 
          book: code, 
          code: code, 
          sid: SESSION,
          image: capturedImage // <==== התמונה החדשה מצורפת כאן
        }, '*');
      }
    } catch(e){
      console.error("שגיאה בהעברת הנתונים לחלון האב:", e);
    }

    // הצגת הודעת הצלחה מהירה על המסך וסגירה
    document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:14px;text-align:center;padding:20px;background:#0f172a;color:#fff;">'
      + '<div style="font-size:50px">✅</div>'
      + '<div style="font-size:18px;font-weight:800;">זוהה בהצלחה!</div>'
      + '<div style="font-size:14px;color:rgba(255,255,255,0.6); direction:ltr;">' + code + '</div>'
      + '</div>';

    setTimeout(function(){ window.close(); }, 1200);
  }

  // הפעלה מיידית של הסורק עם טעינת הדף
  window.addEventListener('load', startCam);
</script>
</body>
</html>
