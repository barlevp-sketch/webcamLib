<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>סורק ספרייה מהיר</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }

    h2 {
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }

    .vwrap {
      position: relative;
      width: min(290px, 86vw);
      height: min(290px, 86vw);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #3b5bdb;
      box-shadow: 0 0 30px rgba(59,91,219,0.5);
    }

    video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .laser {
      position: absolute;
      left: 8%; right: 8%;
      height: 2px;
      background: #3b5bdb;
      box-shadow: 0 0 8px #3b5bdb;
      animation: sc 2s ease-in-out infinite;
    }
    @keyframes sc { 0%, 100% { top: 15% } 50% { top: 85% } }

    .c { position: absolute; width: 20px; height: 20px; border-color: #fff; border-style: solid; }
    .tl { top: 8px; right: 8px; border-width: 3px 0 0 3px }
    .tr { top: 8px; left:  8px; border-width: 3px 3px 0 0 }
    .bl { bottom: 8px; right: 8px; border-width: 0 0 3px 3px }
    .br { bottom: 8px; left:  8px; border-width: 0 3px 3px 0 }

    .status {
      font-size: 13px;
      font-weight: 700;
      background: rgba(59,91,219,0.2);
      border: 1px solid rgba(59,91,219,0.4);
      border-radius: 20px;
      padding: 8px 20px;
      color: #748ffc;
      text-align: center;
      max-width: 300px;
    }

    .btn {
      padding: 13px; border: none; border-radius: 10px;
      font-size: 14px; cursor: pointer;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      width: min(290px, 86vw);
    }
    .btn:hover { background: rgba(255,255,255,0.14); }

    /* מסך שגיאה */
    #serr { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    #serr.on { display: flex; }
    #serr .icon { font-size: 40px; }
    #errmsg { font-size: 13px; color: rgba(255,255,255,0.6); max-width: 260px; }

    /* h5-qrcode overrides */
    #h5qr-v1 video { object-fit: cover !important; }
    #h5qr-v1 img { display: none !important; }
  </style>
</head>
<body>

  <h2>📷 סרוק קוד ברקוד / QR</h2>
  <p class="sub">כוון את מצלמת המכשיר ישירות לקוד</p>

  <div class="vwrap" id="vwrapEl">
    <video id="v1" autoplay playsinline muted></video>
    <div class="laser"></div>
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
  </div>

  <div class="status" id="st1">מפעיל מצלמה...</div>

  <button class="btn" onclick="closeWin()">✕ ביטול וסגירה</button>

  <!-- מסך שגיאה -->
  <div id="serr">
    <div class="icon">📵</div>
    <div>לא ניתן לגשת למצלמה</div>
    <div id="errmsg"></div>
    <button class="btn" onclick="location.reload()">🔄 נסה שוב</button>
  </div>

<script>
  // ─── פרמטרים מה-URL ───────────────────────────────────────
  var params  = new URLSearchParams(location.search);
  var SESSION = params.get('sid') || ('s' + Date.now());
  var GAS_URL = params.get('gas') || '';

  var lastCode     = null;
  var activeScanner = null;

  // ─── אתחול ────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', startCam);

  function startCam() {
    document.getElementById('st1').textContent = '🔍 מחפש ברקוד או קוד QR...';

    var scannerId = 'h5qr-v1';
    var scanDiv   = document.createElement('div');
    scanDiv.id    = scannerId;
    var vWrap     = document.getElementById('v1').parentElement;
    vWrap.appendChild(scanDiv);

    document.getElementById('v1').style.display = 'none';
    scanDiv.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';

    var scanner = new Html5Qrcode(scannerId);
    activeScanner = scanner;

    scanner.start(
      { facingMode: 'environment' },
      { fps: 25, qrbox: undefined, aspectRatio: 1.0, disableFlip: false },
      function(code) {
        if (code && code !== lastCode) {
          lastCode = code;
          handleScannedCode(code.trim());
        }
      },
      function() {}
    ).catch(function() {
      // Fallback למצלמה רגילה
      document.getElementById('v1').style.display = 'block';
      if (scanDiv.parentNode) scanDiv.parentNode.removeChild(scanDiv);
      activeScanner = null;

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(function(stream) {
        document.getElementById('v1').srcObject = stream;
        document.getElementById('st1').textContent = '🔍 מחפש ברקוד...';
      }).catch(function(e) {
        document.getElementById('errmsg').textContent = e.message;
        document.getElementById('vwrapEl').style.display = 'none';
        document.getElementById('st1').style.display = 'none';
        document.querySelector('.btn').style.display = 'none';
        document.getElementById('serr').className = 'on';
      });
    });
  }

  // ─── עצירת סריקה ──────────────────────────────────────────
  function stopScan() {
    if (activeScanner) {
      activeScanner.stop().catch(function() {});
      activeScanner = null;
    }
    var v = document.getElementById('v1');
    if (v && v.srcObject) {
      v.srcObject.getTracks().forEach(function(t) { t.stop(); });
      v.srcObject = null;
    }
  }

  // ─── טיפול בקוד שנסרק ─────────────────────────────────────
  function handleScannedCode(code) {
    beep();
    stopScan();

    // שליחה חזרה לחלון שפתח את הסורק
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'QR_SCANNED',
          book: code,
          code: code,
          barcode: code,
          sid: SESSION
        }, '*');
      }
    } catch(e) {
      console.error('שגיאה בהעברת הנתונים:', e);
    }

    // הצגת הצלחה וסגירה
    document.body.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;' +
      'min-height:100dvh;gap:16px;font-family:Arial,sans-serif;background:#0f172a;color:#fff;text-align:center;padding:20px">' +
      '<div style="font-size:48px">✅</div>' +
      '<div style="font-size:18px;font-weight:700">נסרק בהצלחה!</div>' +
      '<div style="font-size:15px;color:#748ffc;word-break:break-all;max-width:280px">' + code + '</div>' +
      '<div style="font-size:12px;color:rgba(255,255,255,0.4)">החלון ייסגר עוד רגע...</div>' +
      '</div>';

    setTimeout(function() { window.close(); }, 1400);
  }

  // ─── צליל סריקה ───────────────────────────────────────────
  function beep() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var o   = ctx.createOscillator();
      var g   = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.18);
    } catch(e) {}
  }

  // ─── סגירה ────────────────────────────────────────────────
  function closeWin() {
    stopScan();
    window.close();
  }
</script>
</body>
</html>
