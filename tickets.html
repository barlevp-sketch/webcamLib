<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סורק כרטיסים למסיבת סיום</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 5px; color: #3c78d8; }
    p { margin-top: 0; color: #aaa; font-size: 14px; }
    #reader { width: 100%; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
    #reader button { background-color: #3c78d8; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; margin: 10px 0; cursor: pointer; width: 80%; }
    .result-card { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; }
    .success { background-color: #1b5e20; border: 2px solid #4caf50; }
    .warning { background-color: #e65100; border: 2px solid #ff9800; }
    .error { background-color: #b71c1c; border: 2px solid #f44336; }
    .result-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
    .details { text-align: right; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; }
    .details div { margin-bottom: 6px; font-size: 16px; }
    #loading { display: none; font-size: 18px; color: #ffeb3b; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <h1>בקרת כניסה למסיבת סיום</h1>
  <p>אנא פתח מצלמה וסרוק את ה-QR שבידי ההורה</p>
  
  <div id="reader"></div>
  <div id="loading">⏳ בודק נתונים בגיליון, אנא המתן...</div>
  
  <div id="resultCard" class="result-card">
    <div id="resultTitle" class="result-title"></div>
    <div id="resultDetails" class="details"></div>
  </div>
</div>

<script>
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHU9LTYc6-A-qcBrBvXpRDaFF_W1k3eEgn27GBxxjoS_VcfVzawujsz2Xprvo5ZT4/exec";

  let html5QrcodeScanner;
  let isProcessing = false;

  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true;
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultCard').style.display = 'none';
    
    let ticketId = decodedText;
    if (decodedText.includes('id=')) {
      ticketId = decodedText.split('id=')[1];
    }

    fetch(`${GOOGLE_SCRIPT_URL}?id=${encodeURIComponent(ticketId)}`, {
      redirect: 'follow',
      mode: 'cors'
    })
    .then(res => res.text())
    .then(text => {
      let cleanText = text;
      if (text.startsWith('undefined(')) {
        cleanText = text.substring(10, text.length - 2);
      }
      const response = JSON.parse(cleanText);
      showResult(response);
    })
    .catch(err => {
      showError();
    });
  }

  function showResult(response) {
    document.getElementById('loading').style.display = 'none';
    const card = document.getElementById('resultCard');
    const title = document.getElementById('resultTitle');
    const details = document.getElementById('resultDetails');
    
    card.className = "result-card " + response.status;
    title.innerText = response.message;
    
    if (response.details && response.status !== "error") {
      let html = `<div><b>תלמיד/ה:</b> ${response.details.name}</div>
                  <div><b>כיתה:</b> ${response.details.class}</div>
                  <div><b>מספר כרטיס:</b> ${response.details.num}</div>`;
      if (response.details.time) {
        html += `<div style="color: #ffeb3b; font-weight: bold; margin-top: 5px;">⏰ נסרק כבר ב: ${response.details.time}</div>`;
      }
      details.innerHTML = html;
      details.style.display = 'block';
    } else {
      details.style.display = 'none';
    }
    card.style.display = 'block';
    
    setTimeout(() => { isProcessing = false; }, 3500);
  }

  function showError() {
    isProcessing = false;
    document.getElementById('loading').style.display = 'none';
    const card = document.getElementById('resultCard');
    card.className = "result-card error";
    document.getElementById('resultTitle').innerText = "❌ שגיאה: כרטיס לא נמצא במערכת או קוד שגוי.";
    document.getElementById('resultDetails').style.display = 'none';
    card.style.display = 'block';
    setTimeout(() => { isProcessing = false; }, 3500);
  }

  html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
    fps: 10, 
    qrbox: { width: 250, height: 250 },
    rememberLastUsedCamera: true,
    videoConstraints: {
      facingMode: { exact: "environment" }
    }
  });
  html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
