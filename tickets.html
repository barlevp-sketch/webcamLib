<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סורק כרטיסים למסיבת סיום</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 15px; background-color: #121212; color: #ffffff; text-align: center; }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 5px; color: #3c78d8; }
    p { margin-top: 0; color: #aaa; font-size: 14px; }
    #reader { width: 100%; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
    #reader button { background-color: #3c78d8; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; margin: 10px 0; cursor: pointer; width: 80%; }
    .result-card { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; animation: fadeIn 0.2s ease; }
    .success { background-color: #1b5e20; border: 2px solid #4caf50; }
    .warning { background-color: #e65100; border: 2px solid #ff9800; }
    .error   { background-color: #b71c1c; border: 2px solid #f44336; }
    .result-title { font-size: 45px; font-weight: 900; margin-bottom: 14px; }
    .details { text-align: right; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; }
    .details div { margin-bottom: 10px; font-size: 45px; font-weight: 600; }
    #loading { display: none; font-size: 18px; color: #ffeb3b; margin-top: 15px; }
    #cacheStatus { font-size: 35px; color: #555; margin-top: 6px; font-weight: 600; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="container">
  <h1>בקרת כניסה למסיבת סיום</h1>
  <p>אנא פתח מצלמה וסרוק את ה-QR שבידי ההורה</p>
  <div id="cacheStatus">⏳ טוען כרטיסים לזיכרון...</div>
  <div id="reader"></div>
  <div id="loading">⏳ בודק...</div>
  <div id="resultCard" class="result-card">
    <div id="resultTitle" class="result-title"></div>
    <div id="resultDetails" class="details"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHU9LTYc6-A-qcBrBvXpRDaFF_W1k3eEgn27GBxxjoS_VcfVzawujsz2Xprvo5ZT4/exec";

  let ticketCache  = {};
  let cacheReady   = false;
  let isProcessing = false;
  let hideTimer    = null;

  function hideResult() {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    document.getElementById('resultCard').style.display = 'none';
    isProcessing = false;
  }

  // ===== צפצופים =====
  function beep(times) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var delay = 0;
      for (var i = 0; i < times; i++) {
        (function(d) {
          setTimeout(function() {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = times === 1 ? 880 : 440;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
          }, d);
        })(delay);
        delay += 300;
      }
    } catch(e) {}
  }

  function parseGAS(text) {
    let t = text.trim();
    if (t.startsWith('undefined(')) t = t.substring(10, t.length - 2);
    return JSON.parse(t);
  }

  function gasGet(params) {
    return fetch(SCRIPT_URL + '?' + params, { redirect: 'follow', mode: 'cors' })
      .then(r => r.text())
      .then(text => parseGAS(text));
  }

  // טעינה מלאה — בהתחלה בלבד
  function loadCache() {
    gasGet('action=getTicketsWithStatus')
      .then(tickets => {
        ticketCache = {};
        tickets.forEach(t => {
          ticketCache[t.code] = { name: t.name, cls: t.cls, num: t.num, used: !!t.used, time: t.time || null };
        });
        cacheReady = true;
        const el = document.getElementById('cacheStatus');
        el.style.color = '#4caf50';
        el.textContent = '✅ ' + Object.keys(ticketCache).length + ' כרטיסים נטענו לזיכרון';
      })
      .catch(() => {
        const el = document.getElementById('cacheStatus');
        el.style.color = '#f44336';
        el.textContent = '⚠️ זיכרון לא נטען — עובד ישירות מול שרת';
      });
  }

  // סנכרון רקע קל משקל — רק סטטוסים (קוד:true/false)
  function syncStatusOnly() {
    gasGet('action=getStatusOnly')
      .then(statusMap => {
        Object.keys(statusMap).forEach(code => {
          if (ticketCache[code]) {
            ticketCache[code].used = statusMap[code];
          }
        });
        // עדכון אינדיקטור סנכרון
        const el = document.getElementById('cacheStatus');
        const now = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        const total = Object.keys(ticketCache).length;
        const used  = Object.values(ticketCache).filter(t => t.used).length;
        el.style.color = '#4caf50';
        el.textContent = '✅ ' + total + ' כרטיסים | נוצלו: ' + used + ' | עודכן ' + now;
      })
      .catch(() => {
        const el = document.getElementById('cacheStatus');
        el.style.color = '#f44336';
        el.textContent = '⚠️ סנכרון נכשל — ' + new Date().toLocaleTimeString('he-IL');
      });
  }

  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true;
    document.getElementById('resultCard').style.display = 'none';

    let ticketId = decodedText.includes('id=') ? decodedText.split('id=')[1] : decodedText.trim();

    // כרטיס ידוע כנוצל — חסום מיד
    if (cacheReady && ticketCache.hasOwnProperty(ticketId) && ticketCache[ticketId].used) {
      const t = ticketCache[ticketId];
      beep(2);
      showResult({
        status: 'warning',
        message: '⚠️ אזהרה: כרטיס זה כבר נוצל!',
        details: { name: t.name, class: t.cls, num: t.num, time: t.time }
      });
      return;
    }

    // כרטיס נמצא בזיכרון כ"פנוי" — אשר מיידית ועדכן שרת ברקע
    if (cacheReady && ticketCache.hasOwnProperty(ticketId) && !ticketCache[ticketId].used) {
      const t = ticketCache[ticketId];
      t.used = true;
      t.time = new Date().toLocaleTimeString('he-IL');
      beep(1);
      showResult({
        status: 'success',
        message: '✅ הכניסה אושרה! תהנו במסיבה.',
        details: { name: t.name, class: t.cls, num: t.num }
      });
      // עדכון שרת ברקע — אם נכשל, מחזיר מצב
      gasGet('action=markUsed&id=' + encodeURIComponent(ticketId)).catch(() => {
        t.used = false;
        t.time = null;
      });
      return;
    }

    // כרטיס לא בזיכרון — פנייה לשרת
    document.getElementById('loading').style.display = 'block';
    gasGet('id=' + encodeURIComponent(ticketId))
      .then(response => {
        if (response.details) {
          ticketCache[ticketId] = {
            name: response.details.name,
            cls:  response.details.class,
            num:  response.details.num,
            used: response.status === 'success' || response.status === 'warning',
            time: response.details.time || null
          };
        }
        showResult(response);
      })
      .catch(() => showError());
  }

  function showResult(response) {
    document.getElementById('loading').style.display = 'none';
    const card    = document.getElementById('resultCard');
    const title   = document.getElementById('resultTitle');
    const details = document.getElementById('resultDetails');
    card.className = 'result-card ' + response.status;
    title.innerText = response.message;
    if (response.details && response.status !== 'error') {
      let html = '<div><b>תלמיד/ה:</b> ' + response.details.name + '</div>' +
                 '<div><b>כיתה:</b> ' + response.details.class + '</div>' +
                 '<div><b>מספר כרטיס:</b> ' + response.details.num + '</div>';
      if (response.details.time)
        html += '<div style="color:#ffc107;font-weight:bold;">⏰ נסרק כבר ב: ' + response.details.time + '</div>';
      details.innerHTML = html;
      details.style.display = 'block';
    } else {
      details.style.display = 'none';
    }
    card.style.display = 'block';
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(hideResult, 3000);
  }

  function showError() {
    beep(2);
    document.getElementById('loading').style.display = 'none';
    const card = document.getElementById('resultCard');
    card.className = 'result-card error';
    document.getElementById('resultTitle').innerText = '❌ שגיאה: כרטיס לא נמצא או קוד שגוי.';
    document.getElementById('resultDetails').style.display = 'none';
    card.style.display = 'block';
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(hideResult, 3000);
  }

  new Html5QrcodeScanner("reader", {
    fps: 20,
    qrbox: { width: 150, height: 150 },
    rememberLastUsedCamera: true,
    aspectRatio: 1.0,
    videoConstraints: { facingMode: { ideal: "environment" } }
  }).render(onScanSuccess);

  loadCache();
  // סנכרון סטטוס קל משקל כל 15 שניות
  setInterval(syncStatusOnly, 30000);
</script>
</body>
</html>
