<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סורק כרטיסים למסיבת סיום</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    h1 { font-size: 22px; margin-bottom: 5px; color: #3c78d8; }
    p { margin-top: 0; color: #aaa; font-size: 14px; }
    #reader { width: 100%; background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
    #reader button { background-color: #3c78d8; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; margin: 10px 0; cursor: pointer; width: 80%; }

    /* כרטיס תוצאה — מכסה את כל המסך */
    .result-card {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      animation: fadeIn 0.15s ease;
    }
    .result-card.show { display: flex; }
    .success { background-color: #1a5c1e; }
    .warning { background-color: #b84500; }
    .error   { background-color: #7f1010; }

    .result-title { font-size: 26px; font-weight: 800; margin-bottom: 20px; line-height: 1.3; }
    .student-name { font-size: 52px; font-weight: 900; margin-bottom: 12px; letter-spacing: -1px; line-height: 1.1; }
    .details { text-align: center; background: rgba(0,0,0,0.25); padding: 16px 24px; border-radius: 12px; max-width: 340px; width: 100%; }
    .details div { margin-bottom: 8px; font-size: 22px; font-weight: 600; }
    .tap-hint { margin-top: 30px; font-size: 15px; opacity: 0.55; }

    #loading { display: none; font-size: 18px; color: #ffeb3b; margin-top: 15px; }
    #cacheStatus { font-size: 11px; color: #555; margin-top: 6px; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>
<div class="container">
  <h1>בקרת כניסה למסיבת סיום</h1>
  <p>אנא פתח מצלמה וסרוק את ה-QR שבידי ההורה</p>
  <div id="cacheStatus">⏳ טוען כרטיסים לזיכרון...</div>
  <div id="reader"></div>
  <div id="loading">⏳ בודק...</div>
  <div id="resultCard" class="result-card" onclick="dismissResult()">
    <div id="resultTitle" class="result-title"></div>
    <div id="resultName" class="student-name"></div>
    <div id="resultDetails" class="details"></div>
    <div class="tap-hint">הקש לסריקה הבאה</div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHU9LTYc6-A-qcBrBvXpRDaFF_W1k3eEgn27GBxxjoS_VcfVzawujsz2Xprvo5ZT4/exec";

  let ticketCache  = {};
  let cacheReady   = false;
  let isProcessing = false;

  // פרסור בטוח של תגובת גוגל (מנקה undefined עודף אם יש)
  function parseGAS(text) {
    let t = text.trim();
    if (t.startsWith('undefined(')) t = t.substring(10, t.length - 2);
    return JSON.parse(t);
  }

  function gasGet(params) {
    return fetch(SCRIPT_URL + '?' + params, { redirect: 'follow', mode: 'cors' })
      .then(r => r.text())
      .then(text => parseGAS(text));
  }

  // ===== טעינת כל הכרטיסים לזיכרון =====
  function loadCache() {
    gasGet('action=getTicketsWithStatus')
      .then(tickets => {
        ticketCache = {};
        tickets.forEach(t => {
          ticketCache[t.code] = { name: t.name, cls: t.cls, num: t.num, used: !!t.used, time: t.time || null };
        });
        cacheReady = true;
        const el = document.getElementById('cacheStatus');
        el.style.color = '#4caf50';
        el.textContent = '✅ ' + Object.keys(ticketCache).length + ' כרטיסים נטענו לזיכרון';
      })
      .catch(err => {
        const el = document.getElementById('cacheStatus');
        el.style.color = '#f44336';
        el.textContent = '⚠️ זיכרון לא נטען — עובד ישירות מול שרת';
        cacheReady = false;
      });
  }

  // ===== סריקה =====
  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true;
    document.getElementById('resultCard').style.display = 'none';

    let ticketId = decodedText.includes('id=') ? decodedText.split('id=')[1] : decodedText.trim();

    if (cacheReady && ticketCache.hasOwnProperty(ticketId)) {
      // ===== בדיקה מקומית מיידית — ללא loading =====
      const t = ticketCache[ticketId];
      if (t.used) {
        showResult({ status: 'warning', message: '⚠️ אזהרה: כרטיס זה כבר נוצל!',
          details: { name: t.name, class: t.cls, num: t.num, time: t.time } });
      } else {
        t.used = true;
        t.time = new Date().toLocaleTimeString('he-IL');
        showResult({ status: 'success', message: '✅ הכניסה אושרה! תהנו במסיבה.',
          details: { name: t.name, class: t.cls, num: t.num } });
        // עדכון שרת ברקע — לא מחכים לו
        gasGet('action=markUsed&id=' + encodeURIComponent(ticketId)).catch(() => {});
      }

    } else {
      // ===== fallback: לא במטמון — פנייה לשרת =====
      document.getElementById('loading').style.display = 'block';
      gasGet('id=' + encodeURIComponent(ticketId))
        .then(response => {
          // מוסיף לזיכרון לסריקה הבאה
          if (response.details) {
            ticketCache[ticketId] = {
              name: response.details.name,
              cls:  response.details.class,
              num:  response.details.num,
              used: response.status === 'success',
              time: response.details.time || null
            };
          }
          showResult(response);
        })
        .catch(() => showError());
    }
  }

  function showResult(response) {
    document.getElementById('loading').style.display = 'none';
    const card    = document.getElementById('resultCard');
    const title   = document.getElementById('resultTitle');
    const nameEl  = document.getElementById('resultName');
    const details = document.getElementById('resultDetails');

    card.className = 'result-card ' + response.status + ' show';
    title.innerText = response.message;

    if (response.details && response.status !== 'error') {
      nameEl.innerText = response.details.name || '';
      nameEl.style.display = 'block';
      let html = '<div>כיתה ' + response.details.class + ' &nbsp;|&nbsp; כרטיס ' + response.details.num + '</div>';
      if (response.details.time)
        html += '<div style="color:#ffc107;font-weight:bold;margin-top:6px;">⏰ נסרק כבר ב: ' + response.details.time + '</div>';
      details.innerHTML = html;
      details.style.display = 'block';
    } else {
      nameEl.style.display = 'none';
      details.style.display = 'none';
    }

    // סגירה אוטומטית אחרי 3 שניות
    setTimeout(() => { dismissResult(); }, 4000);
  }

  function dismissResult() {
    const card = document.getElementById('resultCard');
    card.className = 'result-card';
    isProcessing = false;
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    const card = document.getElementById('resultCard');
    card.className = 'result-card error show';
    document.getElementById('resultTitle').innerText = '❌ כרטיס לא נמצא או קוד שגוי';
    document.getElementById('resultName').style.display = 'none';
    document.getElementById('resultDetails').style.display = 'none';
    setTimeout(() => { dismissResult(); }, 2500);
  }

  // ===== אתחול =====
  new Html5QrcodeScanner("reader", {
    fps: 15,
    qrbox: { width: 200, height: 200 },
    rememberLastUsedCamera: true,
    aspectRatio: 1.0,
    videoConstraints: { facingMode: { ideal: "environment" } }
  }).render(onScanSuccess);

  loadCache();
</script>
</body>
</html>
